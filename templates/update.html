{% extends "base.html" %}
{% block title %}상품 수정 - 이세계 용사 마켓{% endblock %}
{% block content %}

<div class="board-wrap">
  <div class="board-title-bar">
    <span>✏️ 상품 수정</span>
  </div>

  <form method="post" enctype="multipart/form-data" id="updateForm">
    <div class="form-wrap">
      <div class="form-row">
        <label>아이템명 *</label>
        <input type="text" name="title" id="title" value="{{ item['title'] }}">
      </div>
      <div class="form-row">
        <label>카테고리 *</label>
        <select name="category" id="category">
          <option value="무기"   {% if item['category']=='무기' %}selected{% endif %}>⚔️ 무기</option>
          <option value="방어구" {% if item['category']=='방어구' %}selected{% endif %}>🛡️ 방어구</option>
          <option value="포션"   {% if item['category']=='포션' %}selected{% endif %}>🧪 포션</option>
          <option value="마법서" {% if item['category']=='마법서' %}selected{% endif %}>📖 마법서</option>
          <option value="기타"   {% if item['category']=='기타' %}selected{% endif %}>📦 기타</option>
        </select>
      </div>
      <div class="form-row">
        <label>가격 (골드) *</label>
        <input type="number" name="price" id="price" value="{{ item['price'] }}" min="0">
      </div>
      <div class="form-row">
        <label>판매 상태</label>
        <select name="status">
          <option value="판매중"   {% if item['status']=='판매중' %}selected{% endif %}>판매중</option>
          <option value="판매완료" {% if item['status']=='판매완료' %}selected{% endif %}>판매완료</option>
        </select>
      </div>
      <div class="form-row">
        <label>상품 사진</label>
        <div style="flex:1;">
          {% if item['image'] %}
          <div style="margin-bottom:6px;">
            <img src="/static/uploads/{{ item['image'] }}"
                 style="max-width:160px;max-height:160px;object-fit:contain;border:1px solid #c8d4e8;">
            <div style="margin-top:4px;">
              <label style="font-size:12px;color:#cc2200;font-weight:normal;width:auto;">
                <input type="checkbox" name="delete_image" value="1"> 현재 사진 삭제
              </label>
            </div>
          </div>
          {% endif %}
          <input type="file" name="image" id="imageInput" accept=".jpg,.jpeg,.png,.gif,.webp"
                 style="border:1px solid #b0c4de;padding:4px;font-size:12px;width:100%;"
                 onchange="previewImage(this)">
          <div style="font-size:11px;color:#778;margin-top:3px;">새 사진으로 교체하려면 파일 선택 (jpg, jpeg, png, gif, webp / 최대 5MB)</div>
          <div id="preview-wrap" style="display:none;margin-top:6px;">
            <img id="preview-img" style="max-width:200px;max-height:200px;object-fit:contain;border:1px solid #c8d4e8;">
          </div>
        </div>
      </div>
      <div class="form-row">
        <label>상품 설명 *</label>
        <textarea name="description" id="description">{{ item['description'] }}</textarea>
      </div>
    </div>

    <div class="board-bottom">
      <a href="/detail/{{ item['id'] }}/" class="btn btn-gray">취소</a>
      <button type="button" class="btn btn-orange" onclick="submitCheck()">💾 저장하기</button>
    </div>
  </form>
</div>

<script>
function previewImage(input) {
  var wrap = document.getElementById('preview-wrap');
  var img  = document.getElementById('preview-img');
  if (input.files && input.files[0]) {
    var file = input.files[0];
    if (file.size > 5 * 1024 * 1024) {
      alert('파일 크기가 5MB를 초과합니다.');
      input.value = '';
      wrap.style.display = 'none';
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
      img.src = e.target.result;
      wrap.style.display = 'block';
    };
    reader.readAsDataURL(file);
  } else {
    wrap.style.display = 'none';
  }
}
function submitCheck() {
  var title = document.getElementById('title').value.trim();
  var desc  = document.getElementById('description').value.trim();
  var price = document.getElementById('price').value;
  if (!title) { alert('아이템명을 입력해주세요.'); return; }
  if (!price || price < 0) { alert('가격을 올바르게 입력해주세요.'); return; }
  if (!desc) { alert('상품 설명을 입력해주세요.'); return; }
  document.getElementById('updateForm').submit();
}
</script>
{% endblock %}
